services:
  postgres:
    image: postgres:16
    container_name: dq_etl_postgres
    environment:
      POSTGRES_USER: dq_user
      POSTGRES_PASSWORD: dq_password
      POSTGRES_DB: dq_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dq_user -d dq_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: