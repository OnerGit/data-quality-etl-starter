services:
  postgres:
    image: postgres:16
    container_name: dq_etl_postgres
    environment:
      POSTGRES_USER: dq_user
      POSTGRES_PASSWORD: dq_password
      POSTGRES_DB: dq_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dq_user -d dq_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:latest
    container_name: dq_etl_metabase
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase.db

volumes:
  postgres_data:
  metabase_data:
